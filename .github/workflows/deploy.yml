name: Deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [vault-update]

jobs:
  embed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          repository: KennethOng02/obsidian-vault
          path: vault
          token: ${{ secrets.VAULT_TOKEN }}

      - name: Copy published notes to content/
        run: |
          mkdir -p content
          find vault -name "*.md" | while read f; do
            if grep -qP "^publish:\s*true" "$f"; then
              cp "$f" content/
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run embedding pipeline
        run: npx tsx scripts/embed.ts
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  build-and-deploy:
    needs: embed
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Checkout vault
        uses: actions/checkout@v4
        with:
          repository: KennethOng02/obsidian-vault
          path: vault
          token: ${{ secrets.VAULT_TOKEN }}

      - name: Copy published notes to content/
        run: |
          mkdir -p content
          find vault -name "*.md" | while read f; do
            if grep -qP "^publish:\s*true" "$f"; then
              cp "$f" content/
            fi
          done

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build static site
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
